<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubTrack - Manage Your Subscriptions</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main id="auth-view" class="view-container">
        <div class="auth-card">
            <h1 class="brand-logo">SubTrack</h1>
            <p class="subtitle" id="auth-subtitle">Sign in to manage your bills</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" id="auth-btn" class="btn btn-primary">Login</button>
                <p class="toggle-auth">
                    <span id="auth-toggle-text">Don't have an account?</span> 
                    <a href="#" id="toggle-auth-link">Register here</a>
                </p>
            </form>
            <div id="auth-error" class="error-msg hidden"></div>
        </div>
    </main>

    <main id="dashboard-view" class="view-container hidden">
        <header class="dashboard-header">
            <div class="header-content">
                <h1 class="brand-logo">SubTrack</h1>
                <div class="user-controls">
                    <span id="welcome-message">Welcome, User</span>
                    <button id="logout-btn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <section class="add-sub-section">
                <h2>Add New Subscription</h2>
                <form id="add-sub-form" class="inline-form">
                    <div class="input-group">
                        <input type="text" id="sub-name" required placeholder="e.g., Netflix, Gym">
                    </div>
                    <div class="input-group">
                        <input type="number" id="sub-cost" step="0.01" required placeholder="Cost (e.g., 14.99)">
                    </div>
                    <div class="input-group">
                        <select id="sub-cycle" required>
                            <option value="" disabled selected>Billing Cycle</option>
                            <option value="Weekly">Weekly</option>
                            <option value="Monthly">Monthly</option>
                            <option value="Yearly">Yearly</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Plan</button>
                </form>
            </section>

            <section class="subs-list-section">
                <div class="section-header">
                    <h2>Your Active Subscriptions</h2>
                    <h3 id="total-monthly-cost" class="total-cost">Total: $0.00 / mo</h3>
                </div>
                <div id="subs-grid" class="subs-grid">
                    </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
